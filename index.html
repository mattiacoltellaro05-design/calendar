<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint Prodotti - Gestione Lista</title>
  <style>
    :root {
      --mint-light: #d4e4d8;
      --mint: #a8c4a5;
      --mint-medium: #90b39a;
      --mint-dark: #7d9a7a;
      --mint-darker: #5e7a5a;
      --bg: #f8faf7;
      --text: #2d4a2d;
      --border: #e0e8e0;
      --shadow: 0 4px 20px rgba(125, 154, 122, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--mint-light) 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--mint-darker), var(--mint));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .nav-btn {
      flex: 1;
      padding: 16px 20px;
      background: rgba(168, 196, 165, 0.8);
      border: 1px solid var(--mint);
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .nav-btn.active {
      background: var(--mint);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .nav-btn:not(.active) {
      opacity: 0.7;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 20px;
      border: 2px solid var(--border);
      border-radius: 20px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--mint);
      box-shadow: 0 0 0 4px rgba(168, 196, 165, 0.2);
    }

    .btn {
      padding: 18px 24px;
      border: none;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--mint), var(--mint-medium));
      color: white;
      box-shadow: var(--shadow);
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(125, 154, 122, 0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.8);
      color: var(--text);
      border: 2px solid var(--mint);
    }

    .btn-secondary:hover {
      background: var(--mint-light);
    }

    .products-grid {
      display: grid;
      gap: 15px;
      margin-bottom: 20px;
    }

    .product-btn {
      padding: 20px;
      background: rgba(255,255,255,0.9);
      border: 2px solid var(--border);
      border-radius: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .product-btn:hover {
      border-color: var(--mint);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .lista-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
    }

    .lista-item span {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text);
      opacity: 0.7;
    }

    .empty-state::before {
      content: "🥛";
      display: block;
      font-size: 4rem;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      body { padding: 15px; }
      h1 { font-size: 1.7rem; }
      .nav { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Mint Prodotti</h1>
    </div>

    <div class="nav">
      <button class="nav-btn active" onclick="showSection('home')">Home</button>
      <button class="nav-btn" onclick="showSection('lista')">Lista</button>
    </div>

    <!-- Schermata Home -->
    <div id="home" class="section active">
      <div class="input-group">
        <input type="text" id="newProductInput" placeholder="Nome del nuovo prodotto..." />
      </div>
      <button class="btn btn-primary" onclick="addProduct()">+ Nuovo Prodotto</button>
      <div id="productsList" class="products-grid"></div>
    </div>

    <!-- Schermata Lista -->
    <div id="lista" class="section">
      <div class="lista-items" id="listaItems"></div>
      <button class="btn btn-secondary" onclick="showSection('home')">Indietro</button>
      <button class="btn btn-primary" onclick="clearLista()" style="margin-top: 15px;">Fatto</button>
      <div class="empty-state" id="emptyLista" style="display: none;">
        La lista è vuota. Seleziona prodotti dalla home!
      </div>
    </div>
  </div>

  <script>
    let products = JSON.parse(localStorage.getItem('mintProducts')) || [];
    let lista = JSON.parse(localStorage.getItem('mintLista')) || [];

    function saveData() {
      localStorage.setItem('mintProducts', JSON.stringify(products));
      localStorage.setItem('mintLista', JSON.stringify(lista));
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      event.target.classList.add('active');

      if (section === 'home') {
        renderProducts();
      } else {
        renderLista();
      }
    }

    function addProduct() {
      const input = document.getElementById('newProductInput');
      const name = input.value.trim();
      if (name && !products.includes(name)) {
        products.push(name);
        saveData();
        input.value = '';
        renderProducts();
      }
    }

    document.getElementById('newProductInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addProduct();
    });

    function renderProducts() {
      const container = document.getElementById('productsList');
      container.innerHTML = '';
      if (products.length === 0) {
        container.innerHTML = '<div class="empty-state">Aggiungi il tuo primo prodotto!</div>';
        return;
      }
      products.forEach(name => {
        const btn = document.createElement('div');
        btn.className = 'product-btn';
        btn.textContent = name;
        btn.onclick = () => selectProduct(name);
        container.appendChild(btn);
      });
    }

    function selectProduct(name) {
      if (!lista.includes(name)) {
        lista.push(name);
        saveData();
      }
      showSection('lista');
    }

    function renderLista() {
      const container = document.getElementById('listaItems');
      const empty = document.getElementById('emptyLista');
      container.innerHTML = '';
      if (lista.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      lista.forEach(name => {
        const item = document.createElement('div');
        item.className = 'lista-item';
        item.innerHTML = `<span>${name}</span>`;
        container.appendChild(item);
      });
    }

    function clearLista() {
      lista = [];
      saveData();
      renderLista();
    }

    // Init
    renderProducts();
  </script>
</body>
</html>
