<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint</title>
  <style>
    :root {
      --mint-50: #f8faf7;
      --mint-100: #eaf3ea;
      --mint-200: #d8e8d8;
      --mint-300: #c5ddc5;
      --mint-400: #b3d2b3;
      --mint-500: #a8c4a5;
      --mint-600: #90b39a;
      --mint-700: #7d9a7a;
      --mint-800: #6a8570;
      --mint-900: #5e7a5a;
      --text-primary: #1a3c1a;
      --text-secondary: #4a6f4a;
      --border: rgba(168, 196, 165, 0.3);
    }

    [data-theme="dark"] {
      --mint-50: #1a1f19;
      --mint-100: #253228;
      --mint-200: #314237;
      --mint-300: #3d5046;
      --mint-400: #4a695b;
      --mint-500: #67837a;
      --mint-600: #739a8e;
      --mint-700: #7fa399;
      --mint-800: #8bb2a4;
      --mint-900: #97c2af;
      --text-primary: #e8f5e8;
      --text-secondary: #c0d8c0;
      --border: rgba(151, 194, 175, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, SF Pro Display, HelveticaNeue, sans-serif;
      background: var(--mint-50);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px 16px;
      overflow-x: hidden;
      transition: all 0.3s ease;
    }

    .container { max-width: 390px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 20px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
    }

    .header-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .header-buttons {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .header-btn {
      width: 32px;
      height: 32px;
      border-radius: 18px;
      background: var(--mint-400);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:active {
      background: var(--mint-500);
      transform: scale(0.95);
    }

    .search-container { position: relative; margin-bottom: 20px; }

    .search-input {
      width: 100%;
      padding: 16px 20px 16px 48px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 17px;
      color: var(--text-primary);
    }

    [data-theme="dark"] .search-input { background: rgba(255,255,255,0.1); }

    .search-input:focus {
      outline: none;
      border-color: var(--mint-500);
      box-shadow: 0 0 0 3px rgba(168, 196, 165, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      color: var(--text-secondary);
    }

    .hint-text {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      padding: 0 8px;
      line-height: 1.4;
    }

    .fab-container {
      position: fixed;
      bottom: 32px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .add-btn, .lista-btn {
      width: 56px;
      height: 56px;
      border-radius: 28px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-btn {
      background: linear-gradient(135deg, var(--mint-500), var(--mint-600));
      box-shadow: 0 8px 32px rgba(168, 196, 165, 0.4);
    }

    .lista-btn {
      background: rgba(168, 196, 165, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid var(--mint-500);
      box-shadow: 0 4px 20px rgba(168, 196, 165, 0.3);
    }

    .lista-btn.active {
      background: var(--mint-600);
      box-shadow: 0 6px 24px rgba(144, 179, 154, 0.4);
    }

    .add-btn:active, .lista-btn:active { transform: scale(0.95); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .product-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      text-align: center;
    }

    [data-theme="dark"] .product-card { background: rgba(255,255,255,0.1); }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--mint-500), var(--mint-600));
      border-radius: 20px 20px 0 0;
    }

    .product-card:active {
      transform: scale(0.97);
      border-color: var(--mint-500);
    }

    .product-name { font-weight: 600; margin-bottom: 2px; line-height: 1.2; }
    .product-category { font-size: 12px; color: var(--text-secondary); opacity: 0.8; }

    .edit-mode .product-card { padding: 8px 8px 4px; height: 80px; }
    .edit-controls {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .edit-mode .edit-controls { opacity: 1; }

    .edit-btn {
      width: 24px;
      height: 24px;
      border-radius: 12px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .edit-btn.edit { background: var(--mint-400); color: var(--text-primary); }
    .edit-btn.delete { background: #ef4444; color: white; }
    .edit-btn:active { transform: scale(0.9); }

    /* OVERLAY MIGLIORATO - CENTRATO */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.active { display: flex; }

    .overlay-container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      width: 100%;
      max-width: 360px; /* Ridotto per centrare meglio */
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      padding: 8px; /* Padding interno per centrare contenuto */
    }

    [data-theme="dark"] .overlay-container {
      background: rgba(26, 31, 25, 0.95);
    }

    /* Settings - SPAZIATURA MIGLIORATA */
    .settings-title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin: 28px 0 24px;
      padding: 0 24px;
      color: var(--text-primary);
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px; /* Più padding laterale */
      border-bottom: 1px solid var(--border);
      margin: 0 8px; /* Margini per centrare */
      border-radius: 16px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.5);
    }

    [data-theme="dark"] .settings-item {
      background: rgba(255,255,255,0.1);
    }

    .settings-item:last-child { border-bottom: none; }

    .settings-label {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 32px;
      background: var(--mint-200);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid var(--border);
    }

    .toggle-switch.active { background: var(--mint-500); }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .toggle-switch.active .toggle-knob { transform: translateX(20px); }

    .btn-action {
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-backup {
      background: linear-gradient(135deg, var(--mint-400), var(--mint-500));
      color: var(--text-primary);
    }

    .btn-reset {
      background: #f87171;
      color: white;
      padding: 12px 16px;
    }

    .btn-action:active { transform: scale(0.98); }

    /* Lista styles (invariati) */
    .lista-header { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
    .lista-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .lista-subtitle { text-align: center; font-size: 15px; color: var(--text-secondary); }
    .lista-items { padding: 0 24px 28px; }
    .lista-item {
      display: flex;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(168, 196, 165, 0.1);
    }
    .lista-item:last-child { border-bottom: none; }
    .lista-item-name { font-size: 17px; font-weight: 600; flex: 1; }
    .lista-buttons {
      position: sticky;
      bottom: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    [data-theme="dark"] .lista-buttons { background: rgba(26, 31, 25, 0.95); }
    .btn { flex: 1; padding: 16px; border: none; border-radius: 20px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-indietro { background: var(--mint-200); color: var(--text-primary); border: 1px solid var(--mint-400); }
    .btn-fatto { background: linear-gradient(135deg, var(--mint-500), var(--mint-600)); color: white; }
    .btn:active { transform: scale(0.98); }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    @media (max-width: 480px) {
      .products-grid { gap: 10px; }
      .product-card { padding: 10px 6px; height: 68px; font-size: 13px; }
      .edit-mode .product-card { height: 76px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="status-dot"></div>
      <div class="header-text">Mint</div>
      <span>Offline</span>
      <div class="header-buttons">
        <button class="header-btn" onclick="toggleEditMode()">✏️</button>
        <button class="header-btn" onclick="toggleSettings()">⚙️</button>
      </div>
    </div>

    <div class="search-container">
      <div class="search-icon">🔍</div>
      <input type="text" class="search-input" id="searchInput" placeholder="Cerca un drink..." />
    </div>

    <p class="hint-text">Scrivi nome drink per cercarlo o usa categoria per trovarlo</p>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <div class="fab-container">
    <button class="lista-btn" id="listaBtn" onclick="toggleLista()">🛒</button>
    <button class="add-btn" onclick="showAddProduct()">+</button>
  </div>

  <!-- Settings Overlay -->
  <div class="overlay" id="settingsOverlay">
    <div class="overlay-container">
      <div class="settings-title">Impostazioni</div>
      
      <div class="settings-item">
        <div class="settings-label">Modalità Scura</div>
        <div class="toggle-switch" id="darkModeToggle">
          <div class="toggle-knob"></div>
        </div>
      </div>

      <div class="settings-item">
        <div class="settings-label">Vibrazioni</div>
        <div class="toggle-switch" id="vibrationToggle">
          <div class="toggle-knob"></div>
        </div>
      </div>

      <div class="settings-item">
        <div class="settings-label">Backup Dati</div>
        <button class="btn-action btn-backup" onclick="backupData()">💾 Backup</button>
      </div>

      <div class="settings-item">
        <div class="settings-label" style="opacity: 0.7;">Reset Lista</div>
        <button class="btn-action btn-reset" onclick="resetListaConfirm()">🗑️</button>
      </div>
    </div>
  </div>

  <!-- Lista Overlay -->
  <div class="overlay" id="listaOverlay">
    <div class="overlay-container lista-container">
      <div class="lista-header">
        <div class="lista-title">Lista</div>
        <div class="lista-subtitle">Prodotti selezionati</div>
      </div>
      <div class="lista-items" id="listaItems"></div>
      <div class="lista-buttons">
        <button class="btn btn-indietro" onclick="closeLista()">Indietro</button>
        <button class="btn btn-fatto" onclick="clearLista()">Fatto</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let products = JSON.parse(localStorage.getItem('mintProducts')) || ['Acqua', 'Birra', 'Latte', 'Soda', 'Succo', 'Vino'];
    let lista = JSON.parse(localStorage.getItem('mintLista')) || [];
    let isListaOpen = false;
    let isEditMode = false;
    let currentSearchTerm = '';
    let isDarkMode = localStorage.getItem('mintDarkMode') === 'true';
    let isVibrationEnabled = localStorage.getItem('mintVibration') !== 'false';

    // Init
    products.sort((a, b) => a.localeCompare(b, 'it'));
    updateSettingsToggles();

    function updateSettingsToggles() {
      const darkToggle = document.getElementById('darkModeToggle');
      const vibrationToggle = document.getElementById('vibrationToggle');
      
      darkToggle.classList.toggle('active', isDarkMode);
      vibrationToggle.classList.toggle('active', isVibrationEnabled);
      
      if (isDarkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    }

    function saveData() {
      localStorage.setItem('mintProducts', JSON.stringify(products));
      localStorage.setItem('mintLista', JSON.stringify(lista));
    }

    function saveSettings() {
      localStorage.setItem('mintDarkMode', isDarkMode);
      localStorage.setItem('mintVibration', isVibrationEnabled);
    }

    function vibrate(pattern = 100) {
      if (isVibrationEnabled && 'vibrate' in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function renderProducts() {
      const container = document.getElementById('productsGrid');
      container.innerHTML = '';
      
      let displayProducts = products;
      if (currentSearchTerm) {
        displayProducts = products.filter(p => p.toLowerCase().includes(currentSearchTerm.toLowerCase()));
      }
      
      if (displayProducts.length === 0) {
        container.innerHTML = `
          <div class="product-card empty-state" style="grid-column: 1/-1;">
            <div style="font-size: 48px; margin-bottom: 16px;">🥛</div>
            ${currentSearchTerm ? `Nessun risultato per "${currentSearchTerm}"` : 'Nessun prodotto'}
          </div>
        `;
        return;
      }

      displayProducts.forEach((name) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-name">${name}</div>
          <div class="product-category">Drink</div>
          ${isEditMode ? `
            <div class="edit-controls">
              <button class="edit-btn edit" onclick="editProduct('${name.replace(/'/g, "\\\\'")}')">✏️</button>
              <button class="edit-btn delete" onclick="deleteProduct('${name.replace(/'/g, "\\\\'")}')">🗑️</button>
            </div>
          ` : ''}
        `;
        if (!isEditMode) card.onclick = () => toggleProductInLista(name);
        container.appendChild(card);
      });
    }

    function toggleProductInLista(name) {
      const index = lista.indexOf(name);
      if (index > -1) {
        lista.splice(index, 1);
        vibrate(50);
      } else {
        lista.push(name);
        vibrate([100, 50, 100]);
      }
      saveData();
      updateListaBtn();
      if (isListaOpen) renderLista();
    }

    function updateListaBtn() {
      const btn = document.getElementById('listaBtn');
      btn.textContent = lista.length > 0 ? `🛒 ${lista.length}` : '🛒';
      btn.classList.toggle('active', lista.length > 0);
    }

    function renderLista() {
      const container = document.getElementById('listaItems');
      if (lista.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            La lista è vuota<br><small>Seleziona prodotti dalla griglia</small>
          </div>
        `;
        return;
      }
      container.innerHTML = lista.map(name => `
        <div class="lista-item">
          <div class="lista-item-name">${name}</div>
          <div>✓</div>
        </div>
      `).join('');
    }

    function toggleLista() {
      isListaOpen = !isListaOpen;
      document.getElementById('listaOverlay').classList.toggle('active', isListaOpen);
      if (isListaOpen) renderLista();
    }

    function closeLista() {
      isListaOpen = false;
      document.getElementById('listaOverlay').classList.remove('active');
    }

    function clearLista() {
      lista = [];
      saveData();
      renderLista();
      updateListaBtn();
      vibrate(400);
    }

    function showAddProduct() {
      const name = prompt('Nome nuovo prodotto:');
      if (name && name.trim() && !products.includes(name.trim())) {
        products.push(name.trim());
        products.sort((a, b) => a.localeCompare(b, 'it'));
        saveData();
        renderProducts();
        vibrate(200);
      }
    }

    function editProduct(oldName) {
      const newName = prompt('Modifica nome prodotto:', oldName);
      if (newName && newName.trim() && newName.trim() !== oldName && !products.includes(newName.trim())) {
        const index = products.indexOf(oldName);
        if (index > -1) {
          products[index] = newName.trim();
          const listaIndex = lista.indexOf(oldName);
          if (listaIndex > -1) lista[listaIndex] = newName.trim();
          products.sort((a, b) => a.localeCompare(b, 'it'));
          saveData();
          renderProducts();
          if (isListaOpen) renderLista();
          vibrate(150);
        }
      }
    }

    function deleteProduct(name) {
      if (confirm(`Eliminare "${name}"?`)) {
        const index = products.indexOf(name);
        if (index > -1) {
          products.splice(index, 1);
          const listaIndex = lista.indexOf(name);
          if (listaIndex > -1) lista.splice(listaIndex, 1);
          saveData();
          renderProducts();
          updateListaBtn();
          if (isListaOpen) renderLista();
          vibrate(300);
        }
      }
    }

    function toggleEditMode() {
      isEditMode = !isEditMode;
      document.body.classList.toggle('edit-mode', isEditMode);
      renderProducts();
    }

    // TOGGLE FUNZIONANTI
    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      updateSettingsToggles();
      saveSettings();
      vibrate(100);
    }

    function toggleVibration() {
      isVibrationEnabled = !isVibrationEnabled;
      updateSettingsToggles();
      saveSettings();
      if (isVibrationEnabled) vibrate(200);
    }

    function toggleSettings() {
      document.getElementById('settingsOverlay').classList.toggle('active');
    }

    function backupData() {
      const data = {
        products,
        lista,
        settings: { darkMode: isDarkMode, vibration: isVibrationEnabled },
        timestamp: new Date().toLocaleString('it-IT')
      };
      const dataStr = JSON.stringify(data, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `mint-backup-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      URL.revokeObjectURL(url);
      vibrate(200);
      document.getElementById('settingsOverlay').classList.remove('active');
    }

    function resetListaConfirm() {
      if (confirm('Vuoi davvero azzerare la lista?')) {
        clearLista();
        document.getElementById('settingsOverlay').classList.remove('active');
      }
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearchTerm = e.target.value;
      renderProducts();
    });

    // Click sui toggle switches
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    document.getElementById('vibrationToggle').addEventListener('click', toggleVibration);

    document.querySelectorAll('.overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target.classList.contains('overlay')) {
          e.target.classList.remove('active');
          if (overlay.id === 'listaOverlay') isListaOpen = false;
        }
      });
    });

    // Init
    renderProducts();
    updateListaBtn();
  </script>
</body>
</html>
